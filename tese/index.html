# Introdução 

&lt;hr&gt;

&lt;!-- Antes de tudo vamos entender o que é um radar e sua importância nesta tese.
--&gt;

* **RADAR** é um acrônimo de *Radio Detection and Ranging*

* Ele é baseado nos princípios da propagação eletromagnética, em que, uma onda eletromagnética é emitida por uma fonte e é retrodifundida
   &lt;!--(reflexão da onda na direção da qual eles vieram) --&gt;


De acordo com Zyl (2011), uma imagem de radar é o resultado entre uma interação da energia emitida pelo radar com o objeto em estudo e a aparência da imagem é influenciada pela forma e textura do alvo.

# Introdução 

&lt;hr&gt;

* O radar de abertura sintética (*Synthetic Aperture Radar* - *SAR*) é acoplado a uma plataforma que ao longo da rota destinada transmite microondas em direção a uma cena geográfica;

* Os pulsos emitidos em direção a um cenário real podem ter polarizações circulares e/ou lineares;
&lt;img src="imagens/introdução/pulsosHHHV.jpg" width="50%" style="display: block; margin: auto;" /&gt;

* Quando é utilizado apenas um par de direções, as imagens geradas são chamadas de *SAR* monopolarizadas e, quando utilizado múltiplas direções, o processo é chamado *PolSAR (Polarimetric SAR)*;

&lt;hr&gt;

### Vantagens


* Imagens *SAR* podem ser obtidos de qualquer lugar (terrestre, marítimo, aéreo);
* a qualquer hora (diurno ou noturno);
* em quase todas condições climáticas (nuvens, chuvas);
* produzir imagens de alta resolução (grande largura de banda) das superfícies estudadas;

&lt;br/&gt;

### Desvantagens

* custo alto;
* as imagens obtidas são afetadas por um ruído chamado *speckle*, que gera uma aparência granular nas imagens, criando uma dificuldade na interpretação e análise;

# Introdução 

&lt;hr&gt;

* O *speckle* impõe aos dados *SAR/PolSAR* uma natureza multiplicativa tal que as intensidades *SAR* ou as intensidades multidimensionais de um dado *PolSAR* não se comportem como a lei normal ou Gaussiana.

* Para lidar probabilisticamente com dados speckle de modo a
incorporar sua influência no espaço paramétrico:
  * as distribuições `\(\mathcal{G}_I^0\)` proposta por Frery et al. (1997) para descrever intensidades *SAR multilook*;
  * e `\(\mathcal{G}^0_m\)` introduzida por Freitas, Frery e Correia (2005) para descrever retornos *PolSAR* *multilook* têm se mostrado como excelentes leis  para descrever cenários de diferentes tipos de relevos.

## Modelagem estatística para dados SAR e PolSAR multilook
&lt;hr/&gt;

### Distribuição para o speckle unidimensional

O *speckle* *multilook* é descrito pela distribuição gama, 
`\(Y \sim \Gamma(L, L)\)`,
com densidade

`\begin{align}
  \begin{array}{lr}
  f_Y(y;L,L) = \dfrac{L^{L}}{\Gamma(L)}y^{L - 1}e^{-L y}\,\mathbb{I}_{(0,\infty)}(y), &amp;  (1)
  \end{array}
\label{eq:gama} 
\end{align}`

em que `\(\Gamma(t) = \int\limits^{\infty}_{0} x^{t-1}e^{-x}\mathrm{d}x\)` é a função gama e `\(L\)` é o número de equivalente de *looks* (NEL).



---

## Modelagem estatística para dados SAR e PolSAR multilook
&lt;hr/&gt;

### Distribuição para o retroespalhamento

O retroespalhamento (*backscatter*)
carrega grande parte das informações relevantes da área mapeada.
Em particular,
ele envolve o comportamento físico do alvo; por exemplo, umidade e relevo.

Neste estudo,
a distribuição *gama inversa*
é utilizada
para o retroespalhamento, tendo densidade

`\begin{align}
  \begin{array}{lr}
f(x;\alpha,\gamma) = \dfrac{\gamma^{-\alpha}}{\Gamma(-\alpha)}x^{\alpha - 1}e^{-\frac{\gamma}{x}}\, \mathbb{I}_{(0,\infty)}(x), &amp; (2)
  \end{array}
\label{eq:reciprocalgama}
\end{align}`

em que `\(\alpha &lt; 0\)` é o parâmetro de forma e `\(\gamma\)` é parâmetro de escala.

---

## Modelagem estatística para dados SAR e PolSAR multilook
&lt;hr/&gt;

### Distribuição para intensidade SAR por MM

O modelo multiplicativo (MM) é uma abordagem bem-sucedida para descrever 
retornos SAR.

Sejam `\(X\)` e `\(Y\)` duas variáveis aleatórias escalares positivas e independentes
tal que,
`\(X\)` está associado ao *retroespalhamento*, 
enquanto
`\(Y\)` descreve o *speckle*.

Então, o MM assume que cada
"intensidade"
(norma quadrada de um canal de polarização complexo)
oriunda de um *pixel* de imagem *SAR*
é o resultado de uma variável aleatória
`\(Z\)`
que é o produto de 
`\(X\)` e `\(Y\)`; 
isto é,
`\(Z=Y\times X\)`.

---


## Modelagem estatística para dados SAR e PolSAR multilook
&lt;hr/&gt;

### Distribuição para intensidade SAR por MM


Sejam `\(Y\sim\Gamma(L,L)\)` e
`\(X\sim\Gamma^{-1}(-\alpha,\gamma)\)`,
pode-se mostrar que
`\(Z\)`
tem densidade

`\begin{align*}
  \begin{array}{lr}
f_Z(z;\alpha,\gamma,L)
=
\frac{L^L \Gamma(L-\alpha)}{\gamma^\alpha\Gamma(-\alpha) \Gamma(L)} 
\frac{
	z^{L-1}
}{ 
	[\gamma\,+\,L\,z]^{L-\alpha} 
}\,
\mathbb{I}_{(0,\infty)}(z), &amp; (3)
  \end{array}
\end{align*}`

em que 
`\(\alpha &lt; 0\)`
é o parâmetro de rugosidade,
`\(\gamma\)` é a escala e `\(L\)` é NEL.
Este caso é denotado por `\(Z\sim \mathcal{G}^0_I(\alpha,\gamma,L)\)`.

---

## Modelagem estatística para dados SAR e PolSAR multilook
&lt;hr/&gt;

### Distribuição para intensidade SAR por abordagem empírica

Segundo Li et al. (2011), um modelo alternativo à abordagem de MM, conhecido como abordagem empírica, é a lei gama generalizada ( `\(\text{G}\Gamma\)` ).


Essa
variável aleatória
é denotada por `\(Z \sim G\Gamma (\alpha,\phi,\mu)\)` e sua densidade é

`\begin{align}
  \begin{array}{lr}
f(z;\alpha,\phi,\mu) = \dfrac{\alpha}{\Gamma(\phi)}\mu^{\alpha\phi}z^{\alpha\phi - 1}e^{-(\mu z)^\alpha}\, \mathbb{I}_{(0,\infty)}(z), &amp; (4)
  \end{array}
\label{eq:gamagene}
\end{align}`

em que
`\(\alpha\)` é parâmetro de forma e, `\(\phi\)` e `\(\mu\)` são parâmetros de escala.


---

## Modelagem estatística para dados SAR e PolSAR multilook
&lt;hr/&gt;

### Distribuição para o speckle multidimensional

Nesse caso o retorno é matricial complexo e segue uma distribuição Wishart complexa escalonada, denotada por
`\(\boldsymbol{Y} \sim s\mathcal{W}^{\mathbb{C}}_m(\boldsymbol{\Sigma},L)\)`
e com densidade

`\begin{equation}
  \begin{array}{lr}
f_{\boldsymbol{Y}}(\dot{\boldsymbol{Y}};\boldsymbol{\Sigma},L) = \frac{L^{mL}|\dot{\boldsymbol{Y}}|^{L-m}}{|\boldsymbol{\Sigma}|^L \Gamma_m(L)} \exp\bigl[
-L\operatorname{tr}\bigl(\boldsymbol{\Sigma}^{-1}\dot{\boldsymbol{Y}}\bigr)\bigr]\,\mathbb{I}_{\mathbf{\Omega}_+}(\dot{\mathbf{Y}}), &amp; (5)
  \end{array}
\label{eq:denswishart}
\end{equation}`

em que `\(\dot{\mathbf{Y}}\in\mathbf{\Omega}_+:=\{\mathbf{Y}\in \mathbb{C}^m\times \mathbb{C}^m:\mathbf{Y}=\mathbf{Y}^*\}\)`
é uma saída de `\(\mathbf{Y}\)`,
`\(|\cdot|\)` é o determinante da matriz, `\(\Gamma_m(L)=\pi^{m(m-1)/2}\prod_{i=0}^{m-1}\Gamma(L-i)\)`
é a função gama multivariada
`\(L\geq m\)` é NEL
e `\(\operatorname{tr}(\cdot)\)`
é o operador traço.


---

## Teoria da Informação em dados SAR e PolSAR multilook

&lt;hr&gt;

Dois conceitos importantes são "Informação" e "Entropia" que foram inicialmente definidos no contexto de teoria da comunicação por Shannon (1948). Ele determinou que uma função adequada para quantificar informação preservando a aditividade é a função logarítmica; ou seja,

&lt;br/&gt;

`\begin{align}
  \begin{array}{lr}
    I(Z) = \log_b\left(\frac{1}{f(Z)}\right) = - \log_b\left(f(Z)\right), &amp; (7)
  \end{array}
\end{align}`


em que `\(Z\)` é uma variável aleatória, `\(f(Z)\)` uma densidade (ou função de probabilidade), `\(b\)` é a base do logaritmo utilizado e os valores comumente usados para `\(b\)` são `\(2\)`, o número de Euler ( `\(e\)` ) e 10.

---

## Teoria da Informação em dados SAR e PolSAR multilook

&lt;hr&gt;

Através do teorema H de Boltzmann (BOLTZMANN , 1970), Shannon definiu a entropia de uma variável aleatória contínua `\(Z\)` como:

`\begin{align}
  \begin{array}{lr}
    H(Z) = E[I(Z)] = E[-\ln(f(Z))], &amp; (8)
  \end{array}
\end{align}`
	
em que `\(E(\cdot)\)` é o operador valor esperado e `\(I(Z)\)` é a informação obtida de `\(Z\)` (BORDA, 2011). A entropia pode ser reescrita como:
	
`\begin{align}
  \begin{array}{lr}
	  H(Z) = \int f(z)I(z)dz = - \int f(z)\log_b f(z)dz. &amp; (9)
  \end{array}
\end{align}`

	

---


## Teoria da Informação em dados SAR e PolSAR multilook

&lt;hr&gt;


Em 1994, Salicrú et al. (1994) propuseram a classe (h, `\(\phi\)`) de entropia - que generaliza o conceito original de entropia - e suas distribuições assintóticas.

### A chasse h- `\(\phi\)` de entropias

Seja 
`\(f_{Z}(z;\boldsymbol{\theta})\)` 
a função densidade de `\(Z\)`
com vetor de parâmetros
`\(\boldsymbol{\theta}\in \boldsymbol{\Theta}\subseteq \mathbb{R}^p\)`.
A classe ( `\(h,\phi\)` ) de entropia de
`\(Z\)` 
é definida por

`\begin{align}
  \begin{array}{lr}
H_{\phi}^h(\boldsymbol{\theta})\,=\,h\Big(\,\int_{\mathcal A}\phi(\,f_{Z}(z;\boldsymbol{\theta})\,)\mathrm{d}z\,\Big), &amp; (10)
  \end{array}
  \label{definicao_H}
\end{align}`

em que `\(\phi:\bigl[0,\infty\bigr) \rightarrow \mathbb{R}\)` é côncava e `\(h:\mathbb{R} \rightarrow \mathbb{R}\)` é crescente, ou `\(\phi\)` é convexa `\(h\)` 
é decrescente.
Em particular,
a ES
é obtida quando
`\(h(x)=x\)` e `\(\phi(x)=-x\,\log(x)\)`. 

---

## Teoria da Informação em dados SAR e PolSAR multilook

&lt;hr&gt;


O resultado a seguir foi proposto por Pardo et al. (1997) e aborda o uso de entropia em métodos de inferência estatística.

&lt;div class="contrib"&gt;

  &lt;div class="blockin"&gt; 
  Lema 1:
  &lt;/div&gt;
  
Seja
`\(\widehat{\boldsymbol{\theta}} =[\widehat{\theta_1},\;\widehat{\theta_2},\;\cdots,\;\widehat{\theta_p}]^\top\)`
o estimador de máxima verossimilhança (EMV) para
`\(\boldsymbol{\theta}=[\theta_1,\;\theta_2,\;\cdots,\;\theta_p]^\top\)` 
baseado na amostra aleatória
(amostra independente e identicamente distribuída)
`\(Z_1,\ldots,Z_N\)`, 
de `\(Z\)` com densidade `\(f(z;\boldsymbol{\theta})\)`. 
Então
`\begin{equation}
  \begin{array}{lr}
\sqrt{N} \big[H_h^\phi(\widehat{\boldsymbol{\theta}})-H_h^\phi(\boldsymbol{\theta})\big] \xrightarrow[N\rightarrow \infty]{\mathcal D} \mathcal N\left(0,\sigma_{\phi}^2(\boldsymbol{\theta})\right), &amp; (11)
  \end{array}
\label{eq:conver_distg0i}
\end{equation}`
&lt;/div&gt;

## Teoria da Informação em dados SAR e PolSAR multilook

&lt;hr&gt;

### A classe h- `\(\phi\)` de entropias - cont.


&lt;div class="contrib"&gt;

  &lt;div class="blockin"&gt; 
  Lema 1 - cont.:
  &lt;/div&gt;

em que  `\(\mathcal N(\mu,\sigma^2)\)` 
é a distribuição Normal com média `\(\mu\)`
e variância `\(\sigma^2\)`, '' `\(\xrightarrow[]{\mathcal{D}}\)` '' denota convergência em distribuição,

`\begin{equation}
  \begin{array}{lr}
\sigma_{\phi}^2(\boldsymbol{\theta})=\boldsymbol{\delta}^\top \boldsymbol{{\mathcal K}}(\boldsymbol{\theta})^{-1}\boldsymbol{\delta}, &amp; (12)
  \end{array}
\label{varentro-trab2}
\end{equation}`

`\(\small \boldsymbol{{\mathcal K}}(\boldsymbol{\theta}) = E\{ -\partial^2 \log f_{Z}(Z;\boldsymbol{\theta})/ \partial \boldsymbol{\theta}\,\partial \boldsymbol{\theta}^\top\}\)`
é a matriz de informação de Fisher (MIF)
e 
`\(\small \boldsymbol{\delta}=[\delta_1,\cdots,\delta_p]^\top\)`
tal que
`\(\delta_i=\partial H_h^\phi(\boldsymbol{\theta})/\partial \theta_i\)`
para `\(i=1,2,\ldots,p\)`.

	
&lt;/div&gt;

## Teoria da Informação em dados SAR e PolSAR multilook

&lt;hr&gt;


### A classe h- `\(\phi\)` de entropias - cont.

De acordo com Nascimento, Frery e Cintra (2018), a metodologia para testes de hipóteses e intervalos de confiança baseada na entropia de Shannon é dada como segue:

`\begin{equation}
  \begin{array}{lr}
\left\lbrace \begin{array}{cl}
\mathcal{H}_0 : &amp; H_S(\boldsymbol{\theta}_1)=H_S(\boldsymbol{\theta}_2)=\cdot=H_S(\boldsymbol{\theta}_q) = \nu, \\
\mathcal{H}_1 : &amp; \exists\, i,j \text{, tal que, } H_S(\boldsymbol{\theta}_i) \neq H_S(\boldsymbol{\theta}_j).
\end{array} \right. &amp; (13)
  \end{array}
\end{equation}`


**Há alguma evidência estatística para rejeitar a suposição de que duas amostras SAR/PolSAR vêm do mesmo modelo?**


---



## Teoria da Informação em dados SAR e PolSAR multilook

&lt;hr&gt;

### A classe h- `\(\phi\)` de entropias - cont.

A fim de dar resposta à questão, do Lema 1, temos que

`\begin{align}
  \begin{array}{lr}
\sum\limits_{i=1}^q\dfrac{N_i(H_\text{S}(\widehat{\boldsymbol{\theta}}_i) - \overline{\nu})^2}{\sigma_{\text{S}}^2(\widehat{\boldsymbol{\theta}}_i)} \xrightarrow[N_i\rightarrow \infty]{\mathcal D} \chi^2_{q-1}, &amp; (14)
  \end{array}
\end{align}`


em que

`\begin{align}
  \begin{array}{lr}
\overline{\nu} = 
\left[\sum\limits_{i=1}^q\dfrac{N_i}{\sigma_{\text{S}}^2(\widehat{\boldsymbol{\theta}}_i)}\right]^{-1}
\sum\limits_{i=1}^q\dfrac{N_iH_\text{S}(\widehat{\boldsymbol{\theta}}_i)}{\sigma_{\text{S}}^2(\widehat{\boldsymbol{\theta}}_i)}. &amp; (15)
  \end{array}
\end{align}`

## Teoria da Informação em dados SAR e PolSAR multilook

&lt;hr&gt;

&lt;br/&gt;
### A classe h- `\(\phi\)` de entropias - cont.

&lt;br/&gt;
Uma resposta à questão pode ser dada pela seguinte estatística de teste:

&lt;br/&gt;
`\begin{align}
  \begin{array}{lr}
S_\text{S}(\widehat{\boldsymbol{\theta}}_1,\ldots,\widehat{\boldsymbol{\theta}}_q)\,=\,
\sum\limits_{i=1}^q\dfrac{N_i(H_\text{S}(\widehat{\boldsymbol{\theta}}_i) - \overline{\nu})^2}{\sigma_{\text{S}}^2(\widehat{\boldsymbol{\theta}}_i)}. &amp; (16)
  \end{array}
\label{eq:statistic}
\end{align}`

### A classe h- `\(\phi\)` de entropias - cont.

A partir dos resultados obtidos, pode-se mostrar então a proposição abaixo.


&lt;div class="contrib"&gt;

  &lt;div class="blockin"&gt; 
  Proposição 1:
  &lt;/div&gt;
  
Sejam
`\(\widehat{\boldsymbol{\theta}}_i\)` para `\(i=1,\ldots,q\)` EMVs baseados em amostras aleatórias de tamanho `\(N_i\)` independentes entre si e suficientementes grandes. Se `\(S_S(\widehat{\boldsymbol{\theta}}_1,\ldots,\widehat{\boldsymbol{\theta}}_q) = s\)`, então a hipótese nula `\(\mathcal{H}_0\)`  pode ser rejeitada a um nível nominal `\(\alpha\)` se `\(P(\chi_{q-1}^2 &gt; s) \leq \alpha\)`.

&lt;/div&gt;

No caso de comparar duas amostras do mesmo tamanho `\((N_1=N_2=N)\)` , a Equação (16) reduz a

# ENTROPIA DE SHANNON PARA A DISTRIBUIÇÃO `\(\mathcal{G}_I^0\)` : NOVAS ABORDAGENS PARA SEGMENTAÇÃO E DETECÇÃO DE MUDANÇA EM IMAGENS SAR
&lt;hr/&gt;

---

## Entropia de Shannon para a distribuição `\(\mathcal{G}_I^0\)`
&lt;hr/&gt;

&lt;br/&gt;

* Apesar do processamento *multilook* impor um tipo de controle no efeito do ruído *speckle*, é requerida a proposta de técnicas adaptadas ao processameto de imagens *SAR*.


* O modelo `\(\mathcal{G}_I^0\)` proposto por Frery et al. (1997) tem sido amplamente utilizado para descrever características de imagens *SAR*.

* O uso de medidas da TI combinadas com modelos ligados a física de formação das imagens tem apontado para bons desempenhos.


---

## Entropia de Shannon para a distribuição `\(\mathcal{G}_I^0\)`
&lt;hr/&gt;


&lt;div class="contrib"&gt;

  &lt;div class="blockin"&gt; 
  Quanto à combinação entre TI e modelos SAR, duas questões em aberto (ao melhor do nosso conhecimento) são:
  &lt;/div&gt;

--

1. **O que dizer da expressão em forma fechada para a entropia de Shannon utilizando a distribuição `\(\mathcal{G}_I^0\)` ?**

--

2. **Como aplicar essa quantidade e sua possível distribuição no processamento (particularmente na análise de agrupamento e detecção de mudança) de retornos SAR?**

&lt;/div&gt;

---

## Entropia de Shannon para a distribuição `\(\mathcal{G}_I^0\)`
&lt;hr/&gt;


&lt;div class="contrib"&gt;

  &lt;div class="blockin"&gt; 
  Contribuições:
  &lt;/div&gt;
  
As duas primeiras propostas consistem de métodos de **segmentação** e de **detecção de mudanças** para imagens *SAR*. Para tal, são assumidas as distribuições `\(\Gamma\)` e `\(\mathcal{G}_I^0\)` e suas versões estocásticas para entropia de Shannon (ES).

Neste capítulo, uma forma fechada para expressão da entropia de Shannon com base na distribuição `\(\mathcal{G}_I^0\)` (um modelo flexível para intensidades *SAR*) é derivada. Adicionalmente, várias de suas propriedades são derivadas.
&lt;/div&gt;

---


## Entropia estocástica de Shannon para `\(\mathcal{G}^0_I\)` e sua distribuição assintótica
&lt;hr/&gt;

&lt;!--
Utilizando os resultados do Capítulo 3, algumas propriedades da ES são derivadas para o modelo `\(\mathcal{G}^0_I\)`, necessárias para a construção do novo mecanismo de segmentação.

A seguir a expressão de forma fechada para ES da distribuição `\(\mathcal{G}^0_I\)` é
--&gt;

&lt;div class="contrib" style="font"&gt;

&lt;div class="blockin"&gt; 

Teorema 1 :
&lt;/div&gt;

Seja
`\(Z \sim \mathcal{G}_I^0 (\alpha, \gamma, L)\)` ,
então a ES de `\(Z\)` é dada por

&lt;p style="font-size:19px;"&gt;
`\begin{align}
  \begin{array}{lr}
    \begin{array}{rl}
H_\text{S}(\,\mathcal{G}^0_I\,)
\,=\, &amp;
\,H_\text{S}(\,[\alpha,\gamma,L]\,)
\,=\,
E[-\log\,f_Z(Z;\alpha,\gamma,L)]
\nonumber \\
\,=\,&amp;
\,-\,\log\frac{
L^L\,\Gamma(L\,-\,\alpha)
}{
\Gamma(-\alpha)\,
\gamma^\alpha
\,\Gamma(L)
}
\nonumber \\
&amp;\,+\,
(1-L)\,\Big\{\,
\psi^{(0)}(L) 
\,-\,\log L 
\,+\,\log\gamma 
\,-\,\psi^{(0)}(-\alpha)
\,\Big\}
\nonumber \\
&amp;
+
\,(\,L\,-\,\alpha\,)\,
[\,\psi^{(0)}(\,L\,-\,\alpha)\,+\,\log \gamma\,-\,\psi^{(0)}(-\alpha)\,], 
  \end{array} &amp; (18)
  \end{array}
\label{entropy_g}
\end{align}`
em que `\(\psi^{(0)}(\cdot)\)` é a função digama.
&lt;/p&gt;
&lt;/div&gt;

---

## Entropia estocástica de Shannon para `\(\mathcal{G}^0_I\)` e sua distribuição assintótica
&lt;hr/&gt;


&lt;div class="contrib" style="font"&gt;

&lt;div class="blockin"&gt; 

Lema 2:
&lt;/div&gt;

Seja
`\(Z \sim \Gamma^* ( L, \mu ) := \Gamma( L, L/\mu )\)` ,
a ES de `\(Z\)` é dada por

&lt;p style="font-size:20px;"&gt;
`\begin{align}
  \begin{array}{lr}
    \begin{array}{rl}
H_\text{S}(\,\Gamma^*\,)\,=\,&amp;H_\text{S}(\,[L,\mu]\,)\, \\
=\,&amp;\,L \, \left( \,\log L\, - \, \log \mu \right) + \log \Gamma(L) + (1-L)\psi^{(0)}(L).
  \end{array} &amp; (19)
  \end{array}
\label{entropy_gam}
\end{align}`
&lt;/p&gt;
&lt;/div&gt;

Nesse estudo, é assumido o termo "entropia estocástica" como a expressão da entropia após a substituição dos parâmetros por seus estimadores consistentes (como pelos EMVs).

---

## Um novo algoritmo de segmentação baseado em Entropia
&lt;hr/&gt;


No que segue, um novo paradigma de segmentação para imagens *SAR* multidimensional é desenvolvido, levando em consideração as ESs estocásticas para `\(\Gamma^*\)` e `\(\mathcal{G}_I^0\)` .

Assumindo que
(i) `\(\widehat{\mathbf{{H}}}_S(i)\)` e `\(\widehat{\mathbf{{H}}}_S(j)\)` são independentes
e
(ii) adotando a probabilidade a priori de que o `\(i\)`-ésimo *pixel* pertence ao `\(g\)`-ésimo grupo como `\(p\left(U_{ig} = 1\right) = \pi_g\in [0, 1]\)` tal que
`\(\sum_{g=1}^c \pi_g = 1\)`,
então 
a densidade conjunta da imagem, `\(\widehat{\mathbf{{H}}}_S\)`, é

`\begin{align}
  \begin{array}{lr}
p\left(\mathbf{\dot{H}}_S;\boldsymbol{\theta}\right) =
\prod_{i=1}^T \left\{ \sum_{g=1}^{c} \pi_g\bigg[ f_{_\mathcal{N}}(\mathbf{\dot{H}}_S(i);\boldsymbol{\theta}_g)\bigg]\right\}, &amp; (20)
  \end{array}
\label{modelmmg0i}
\end{align}`

que é o modelo de segmentação.


---

## Um novo algoritmo de segmentação baseado em Entropia
&lt;hr/&gt;

Baseando-se na Equação (20),
a probabilidade condicional
da entropia no `\(i\)`-ésimo *pixel* pertencer a `\(g\)`-ésima região na `\(k\)`-ésima iteração dado uma imagem é:

`\begin{align}
  \begin{array}{lr}
  \begin{array}{rl}
\label{eq:prob_prior1g0i}
p\left(U_{ig}=1|\mathbf{\dot{H}}_S(i);\hat{\mathbf{\theta}}^{(k)}\right) = &amp;
\hat{\tau}_g\left(\hat{\mathbf{\theta}}^{(k)} | \mathbf{\dot{H}}_S(i) \right)  \\
= &amp; \dfrac{\hat{\pi}_g^{(k)}(i) \bigg[ f_{_\mathcal{N}}\left(\mathbf{\dot{H}}_S\!(i);\hat{\mathbf{\theta}}_g^{(k)}\right)\bigg] }{\sum\limits_{g=1}^{c} {\hat{\pi}_g^{(k)}(i)}\bigg[ f_{_\mathcal{N}}\left(\mathbf{\dot{H}}_S\!(i);\hat{\mathbf{\theta}}_g^{(k)}\right)\bigg]}. \nonumber
  \end{array} &amp; (21)
  \end{array}
\end{align}`



---

# ENTROPIA DE SHANNON PARA A DISTRIBUIÇÃO `\(\mathcal{G}_m^0\)` : ENSAIOS SOBRE SEGMENTAÇÃO NÃO SUPERVISIONADA E DETECÇÃO DE MUDANÇA
&lt;hr/&gt;

---

##  Entropia de Shannon para a distribuição `\(\mathcal{G}_m^0\)`
&lt;hr/&gt;

&lt;br/&gt;

* Este capítulo consiste na extensão do estudo anterior para as distribuições polarimétricas `\(\mathcal{G}^0_m\)` e Wishart complexas escalonadas ( `\(\text{s}\mathcal{W}^\mathbb{C}_m\)` ). Ou seja, novas estratégias de segmentação e detecção de mudança são endereçadas.

* Serão utilizados medidas de Teoria da Informação para lidar com imagens *PolSAR*.

* Um dos desafios no processamento de imagens é o *speckle multidimensional*. Ele é modelado com o ruído multiplicativo e tem um efeito negativo, podendo levar a uma interpretação errada da cena nas análises (LANG et al., 2014).

---

##  Entropia de Shannon para a distribuição `\(\mathcal{G}_m^0\)`

&lt;hr/&gt;

&lt;br/&gt;

&lt;div class="contrib"&gt;

  &lt;div class="blockin"&gt; 
  Contribuições:
  &lt;/div&gt;
  
As contribuições no contexto *PolSAR multilook* envolvem as distribuições `\(\text{s}\mathcal{W}^\mathbb{C}_m\)` e `\(\mathcal{G}^0_m\)` para descrever retornos *PolSAR*.
Inicialmente **uma expressão em forma fechada para a entropia de Shannon da `\(\mathcal{G}^0_m\)` é derivada** bem como várias quantidades matemáticas associadas, tais que como funções gradiente sobre a nova entropia e a matriz informação observada. Com base em seu comportamento assintótico,
novos **algoritmos de segmentação** não supervisionado e **detecção de mudança** são propostos.
&lt;/div&gt;

---



## Background para Inferência Estatística baseada na Entropia de Shannon

&lt;hr/&gt;

&lt;!--Frery, Cintra e Nascimento (2013) derivaram as entropias de Shannon para o modelo polarimétrico `\(\text{s}\mathcal{W}^\mathbb{C}_m\)`. A seguir é derivado a ES para a distribuição `\(\mathcal{G}^0_m\)` e o resultado é mostrado no seguinte teorema. --&gt;

&lt;div class="contrib"&gt;

  &lt;div class="blockin"&gt; 
  Teorema 2 : 
  &lt;/div&gt;

Seja
`\(\mathbf{Z} \sim \mathcal{G}^0_m ( \alpha, \mathbf{\Sigma}, L )\)`,
então a entropia de Shannon para
`\(\mathbf{Z}\)`
é dada por

&lt;p style="font-size:20px;margin-top: -15px;"&gt;
`\begin{align}
\begin{array}{lr}
\begin{array}{rl}
H_\text{S}(\,\mathcal{G}^0_m\,) \, = &amp; 
\,H_\text{S}(\,[\alpha,\mathbf{\Sigma},L]\,) \nonumber \\ 
	\,= &amp; \,
	(m-L)\,\Big\{\,\log|\mathbf{\Sigma}|\,+\,\psi^{(0)}(L) -\,m\,\log L \nonumber  \\
	&amp;
	\,+\,m\,\log(-\alpha-1)\,-\,m\,\psi^{(0)}(-\alpha)\,\Big\} \\
	&amp;
+\,(\,m\,L\,-\,\alpha\,)\,[\,\psi^{(0)}(\,m\,L\,-\,\alpha\,)  +\,\log(\,-\alpha\,-\,1\,)\,\\
	&amp;
	-\,\psi^{(0)}(\,-\alpha\,)\,]
	\,-\,\log\frac{
		L^{mL}\,\Gamma(mL\,-\,\alpha)
	}{
		|\mathbf{\Sigma}|^L\,\Gamma(-\alpha)\,(-\alpha-1)^\alpha\,\Gamma_m(L)
	}. \nonumber
	\end{array} &amp; (22)
	\end{array}
\end{align}`
&lt;/p&gt;
&lt;/div&gt;


---

## Background para Inferência Estatística baseada na Entropia de Shannon

&lt;hr/&gt;

Como um caso particular,
temos
`\(H_S(\mathcal{G}^0_m)\rightarrow H_S(s\mathcal{W}^{\mathbb{C}}_m)\)`
quando
`\(\alpha \rightarrow \infty\)` ,
em que ( FRERY; CINTRA; NASCIMENTO, 2013)

&lt;div class="contrib"&gt;

  &lt;div class="blockin2"&gt; 
  &lt;/div&gt;

&lt;p style="font-size:22px;margin-top: -15px;"&gt;
`\begin{align}
\begin{array}{lr}
    \begin{array}{rl}
H_\text{S}(\,s\mathcal{W}^{\mathbb{C}}_m\,)\,= &amp; \,H_\text{S}(\,[\mathbf{\Sigma},L]\,) \nonumber \\
\,= &amp; \,
\dfrac{m(m-1)}{2}\log \pi - m^2 \log L + m \log |\mathbf{\Sigma}| \\
&amp; \,+ mL 
+(m-L)\psi_m^{(0)}(L) \nonumber \\
&amp;\, + \sum\limits_{k=0}^{m-1} \log  \Gamma (L-k).
	\end{array} &amp; (23)
	\end{array}
\end{align}`
&lt;/p&gt;
&lt;/div&gt;


---



## Um novo algoritmo de segmentação baseado em Entropia
&lt;hr/&gt;

Adotando a probabilidade a priori do `\(i\)`-ésimo *pixel* pertencer ao `\(g\)`-ésimo grupo como `\(p\left(U_{ig} = 1\right) = \pi_g\in [0, 1]\)`
tal que `\(\sum_{g=1}^c \pi_g = 1\)`, então a densidade conjunta para `\(\widehat{\mathbf{{H}}}_S\)` é dada por 
	
`\begin{align}
  \begin{array}{lr}
p\left(\dot{H}_S;\mathbf{\theta}\right) = \prod_{i=1}^T \left\{ \sum_{g=1}^{c} \pi_g\bigg[ f_{_\mathcal{N}}(\dot{H}_S(i);\mathbf{\theta}_g)\bigg]\right\}, &amp; (24)
  \end{array}
\end{align}`
	
que denominamos como modelo de segmentação.

---

## Um novo algoritmo de segmentação baseado em Entropia
&lt;hr/&gt;

### Estimativa dos parâmetros do modelo pelo algoritmo Expectation-Maximization Estocástico


* O algoritmo expectation-maximization estocástico (Stochastic Expectation-Maximization - SEM). É uma versão estocástica do EM e algumas vantagens do algoritmo SEM são:
    * O baixo custo computacional em relação ao EM.
    * A convergência para o máximo local quando o modelo ajustado é analiticamente intratável.
    * Não há necessidade de determinar a esperança condicional na forma fechada como é exigido no EM e,
    * também é possível substituir os EMVs por outros estimadores, desde que suas propriedades de convergência sejam satisfeitas.

---

Neste estudo, utiliza-se 	o erro absoluto relativo das verossimilhanças entre as etapas. Se o erro absoluto relativo é menor que um certo *threshold* ( `\(\epsilon\)` ), então o algoritmo converge. Neste estudo, utilizou-se `\(\epsilon = 1\times10^{-5}\)`.

# SOMAS COMPOSTAS PARA MATRIZES ESTOCÁSTICAS APLICADAS A SISTEMAS POLSAR
&lt;hr/&gt;


---

### SOMAS COMPOSTAS PARA MATRIZES ESTOCÁSTICAS APLICADAS A SISTEMAS POLSAR

&lt;hr/&gt;


* Este capítulo é focado na proposta de distribuições para dados *PolSAR* multilook cujo suporte é o conjunto de matrizes hermitianas positivas definidas, diga-se `\(\mathbf{\Omega}_+\)` , também conhecido como o conjunto das Matrizes de covariâncias amostrais (MCA) (BIAN; MERCER, 2014).

* Essas distribuições são frequentemente derivadas:
   * ou da modelagem multiplicativa (MM) (FREITAS; FRERY; CORREIA, 2005)
   * ou da transformada inversa de Fourier (TIF) (YUEH et al., 1989).

* Esses modelos possuem uma explicação física e descrevem bem vários tipos de solo puro (que possuem mesma característica), porém eles frequentemente requerem uma abordagem de mistura para trabalhar com terrenos multimodais.


---

### SOMAS COMPOSTAS PARA MATRIZES ESTOCÁSTICAS APLICADAS A SISTEMAS POLSAR

&lt;hr/&gt;

&lt;br/&gt;
* Em geral, uma imagem *PolSAR* é não homogênea e a definição de uma janela automática na imagem (sobre a qual frequentemente se quer extrair atributos locais) pode apresentar dados multimodais;

* Nesse caso, a distribuição dos dados pode ser aproximada por um modelo de mistura ( EL-ZAART; ZIOU , 2007; EVERITT , 2014);

* Este trabalho avança na proposta de dois novos modelos para dados *PolSAR multilook*.


---

### SOMAS COMPOSTAS PARA MATRIZES ESTOCÁSTICAS APLICADAS A SISTEMAS POLSAR

&lt;hr&gt;


&lt;div class="contrib"&gt;

  &lt;div class="blockin"&gt; 
  Contribuições:
  &lt;/div&gt;
  
Novas distribuições para dados *PolSAR multilook* usando a abordagem de soma estocástica são introduzidas para descrever dados multimodais. Elas são denominadas como composta Poisson truncada Wishart complexa ( `\(\text{CPT}\mathcal{W}^\mathbb{C}_m\)` ) e composta geométrica Wishart complexa ( `\(\text{CG}\mathcal{W}^\mathbb{C}_m\)` ). Algumas propriedades matemáticas das distribuições são derivadas, tais como as funções características (fc) e cumulantes de Mellin. Novos mecanismos de estimação por máxima verossimilhança via algoritmo *EM (Expectation-Maximization)*
são derivados e avaliados por experimentos Monte Carlo.
&lt;/div&gt;

---

## Modelos da literatura e formulação física das novas propostas

&lt;hr/&gt;

Tomando o MM como mecanismo gerador de distribuições *PolSAR*, cada retorno associado a uma entrada da imagem é o produto de duas variáveis aleatórias independentes, que descrevem a configuração do terreno e o efeito do speckle.


O retorno `\(\mathbf{Z} = \mathbf{Y} X\)` tem densidade dada por (ANFINSEN; ELTOFT , 2011)

`\begin{align*}
  \begin{array}{lr}
f_{\mathbf{Z}}(\dot{\mathbf{Z}})
=
\int_0^{\infty}	
x^{-m^2}\underbrace{f_{\mathbf{Y}}(\dot{\mathbf{Z}}/x)}_{\text{Speckle}}\underbrace{f_X(x)}_{\text{Backscatter}}
\mathrm{d}x,	&amp; (25)
  \end{array}
\end{align*}`

em que `\({\dot{\mathbf{Z}}}\in\mathbf{\Omega}_+:=\{\mathbf{Z}\in \mathbb{C}^m\times \mathbb{C}^m:\mathbf{Z}=\mathbf{Z}^*\}\)`
é uma possível realização de `\(\mathbf{Z}\)`
e
`\((\cdot)^*\)` é o operador transposto conjugado.

## Modelos da literatura e formulação física das novas propostas
&lt;hr/&gt;

* Há evidências de que a distribuição Wishart complexa pode representar o retorno *PolSAR* de cenários homogêneos (GOODMAN, 1963; HAGEDORNA et al., 2006).

* As distribuições Poisson truncada e geométrica são usadas para modelar a quantidade de sinais retornados em uma célula de resolução.

* Combinando essas duas evidências, propomos a soma aleatória da distribuição Wishart complexa com o número de termos seguindo as leis Poisson truncada e geométrica como dois descritores para o retorno de dados *PolSAR*.

---

## Novos modelos
&lt;hr/&gt;

Primeiramente, 
seja
`\(\mathbf{Z}_i\sim \mathcal{W}_{m}^{\mathbb{C}}(\mathbf{\Sigma},L)\)` para `\(i=1,\ldots,N\)`
com função densidade de probabilidade

`\begin{align}
  \begin{array}{lr}
f({\dot{\mathbf{Z}}_i}) =
  \frac{|{\dot{\mathbf{Z}}_i}|^{L-m}}{|\mathbf{\Sigma}|^L\Gamma_m(L)}
\exp \left\{ - \operatorname{tr} \left(\mathbf{\Sigma}^{-1}{\dot{\mathbf{Z}}_i} \right)  \right\}
 \, \mathbb{I}_{ \mathbf{ \Omega }_+ } ( \dot{ \mathbf{S} } ) &amp; (26)
  \end{array}
\end{align}`


em que `\(\Gamma_m(L)\)`
é a função gama multivariada.
Então,
`\(\mathbf{S}_k=\sum_{i=1}^k\mathbf{Z}_i\sim \mathcal{W}_{m}^{\mathbb{C}}(\mathbf{\Sigma},kL)\)` (MAIWALD; KRAUS, 2000)
e
a matriz de coerência por célula
segue a soma composta
`$$\mathbf{S}=\sum_{i=1}^N\mathbf{Z}_i$$`  e
tal que `\(N\sim \text{TPo}(\lambda)\)`,
logo a densidade é dada por

---

## Novos modelos
&lt;hr/&gt;

`\begin{align*}
  \begin{array}{lr}
  \begin{array}{rl}
f({\dot{\mathbf{S}}})
&amp;=\sum_{k=1}^\infty P(N=k)f_{\mathbf{S}_k}({\dot{\mathbf{S}}})\,\mathbb{I}_{\mathbf{\Omega}_+}(\dot{\mathbf{S}})
\\
&amp;=
\left(\frac{1}{\mathrm{e}^\lambda-1}\right)
\sum_{i=1}^\infty\frac{\lambda^k}{k!}f_{\mathcal{W}_{m}^{\mathbb{C}}(\mathbf{\Sigma},kL)}({\dot{\mathbf{S}}})
\\
&amp;=\left(\frac{\mathrm{e}^{-\operatorname{tr}\left(\mathbf{\Sigma}^{-1}{\dot{\mathbf{S}}}\right)}}{|{\dot{\mathbf{S}}}|^m\left(\mathrm{e}^\lambda-1\right)}\right)\sum_{i=1}^\infty\frac{\left(\lambda|\mathbf{\Sigma}^{-1}{\dot{\mathbf{S}}}|^L\right)^k}{k!\Gamma_m(kL)},
  \end{array} &amp; (27)
  \end{array}
\end{align*}`
em que `\({\dot{\mathbf{S}}}=\{s_{i,j}\}\)` é uma possível realização de `\({\mathbf{S}}=\{S_{i,j}\}\)`.

Esta situação é denotada por
`\(\mathbf{S}\sim \text{CPT}\mathcal{W}_{m}^{\mathbb{C}}(\lambda,\mathbf{\Sigma},L)\)`.

---


## Novos modelos
&lt;hr/&gt;


Agora assuma que `\(N\sim \text{Geo}(p)\)` e `\(\mathbf{Z}_i\sim \mathcal{W}_{m}^{\mathbb{C}}(\mathbf{\Sigma},L)\)` para `\(i=1,\ldots,N\)`,
a matriz de coerência por célula segue a soma composta
 `\(\mathbf{S}=\sum_{i=1}^N\mathbf{Z}_i\)` com densidade
 
`\begin{align*}
  \begin{array}{lr}
  \begin{array}{rl}
f({\dot{\mathbf{S}}})
&amp;=\sum_{k=1}^\infty P(N=k)f_{\mathbf{S}_k}(\dot{\mathbf{S}}) \mathbb{I}_{\mathbf{\Omega}_+}(\dot{\mathbf{S}})
\\
&amp;=
\left(
\frac{
	p\mathrm{e}^{-\operatorname{tr}\left(\mathbf{\Sigma}^{-1}{\dot{\mathbf{S}}}\right)}
}{
	(1-p)|{\dot{\mathbf{S}}}|^m
}
\right)
\sum_{k=1}^\infty
\frac{
	\left((1-p)|\mathbf{\Sigma}^{-1}{\dot{\mathbf{S}}}|^L\right)^k
}{
	\Gamma_m(kL)
}\,\mathbb{I}_{\mathbf{\Omega}_+}(\dot{\mathbf{S}}).
  \end{array} &amp; (28)
  \end{array}
\end{align*}`

Essa situação é denotada como `\(\mathbf{S}\sim \text{CG}\mathcal{W}_{m}^{\mathbb{C}}(p,\mathbf{\Sigma},L)\)`.

## Propriedades Matemáticas -  Função característica

&lt;hr/&gt;

&lt;div class="contrib"&gt;

  &lt;div class="blockin"&gt; 
  Lema 3:
  &lt;/div&gt;

Seja
`\(\mathbf{S} = \sum\limits_{i=1}^{N} \mathbf{Z}_i\)`
tal que
`\(\mathbf{Z}_1,\ldots,\mathbf{Z}_N\)`
é uma amostra aleatória retirada de
`\(\mathbf{Z}\)`
com *fc*
`\(\varphi_{\mathbf{Z}}(\cdot)\)`
e
`\(N\)`
é
uma variável aleatória inteira positiva
com *fc*
`\(\varphi_{N}(\cdot)\)`.
A *fc* de `\(\mathbf{S}\)` quando `\(N\)` e `\(\mathbf{Z}_i\)` são independentes é dada por
`\begin{align}
\varphi_{\mathbf{S}}(\mathbf{T}) &amp; = E(e^{i\mathbf{T}\mathbf{S}})\\
&amp; =  \varphi_{N}\left(-i\log\varphi_{\mathbf{Z}}(\mathbf{T})\right),\text{ em que } i = \sqrt{-1}.
\end{align}`
&lt;/div&gt;

---


## Propriedades Matemáticas -  Função característica

&lt;hr/&gt;

* `\(N \sim \text{TPo}(\lambda)\)` com `\(\varphi_{N}(t) = \dfrac{e^{\lambda e^{it}}-1}{e^{\lambda}-1}\)`.

* `\(N \sim \text{Geo}(p)\)` com `\(\varphi_{N}(t) = \dfrac{pe^{it}}{1-qe^{it}}	= \dfrac{p}{e^{-it}-q}\)`.

* `\(\mathbf{Z}_k\sim \mathcal{W}_{m}^{\mathbb{C}}(L,\mathbf{\Sigma})\)`
	com *fc*
	`\(\varphi_{\mathbf{Z}_k}(\mathbf{T}) =  |\mathbf{\Sigma}|^{-L}|\mathbf{\Sigma}^{-1} - i\mathbf{T}|^{-L}\)`

## Diagrama de Mellin
&lt;hr/&gt;

A transformada de Mellin aplicada a matrizes aleatórias hermitianas é definida em
`\(\mathbf{\Omega}_+\)`
(ANFINSEN; DOULGERIS; ELTOFT, 2009) e, portanto, pode ser aplicada aos modelos
`\(\text{CPT}\mathcal{W}_{m}^{\mathbb{C}}\)` e  `\(\text{CG}\mathcal{W}_{m}^{\mathbb{C}}\)`.

Seja `\(\mathbf{C} \in  \mathbf{\Omega}_+\)`, 
a transformada de Mellin para o mapeamento
`\(g(\mathbf{C}): \mathbf{\Omega}_+ \rightarrow \mathbb{R}\)`
é definida como:

`\begin{align*}
  \begin{array}{lr}
\phi_{\mathbf{C}}(s) &amp; = \mathcal{M}\{g(\mathbf{C})\}(s)
= \int\limits_{\mathbf{\Omega}_+}^{}|\mathbf{C}|^{s-m}g(\mathbf{C})\mathrm{d}\mathbf{C} &amp; (29)
  \end{array}
\end{align*}`

com `\(s \in \mathbb{C}\)`, sempre que a integral existe.

---


## Diagrama de Mellin
&lt;hr/&gt;

A função geradora de cumulantes do tipo Mellin (*Mellin-kind cumulant-generating function* - MCGF)
é definida como

`\begin{align}
  \begin{array}{lr}
\varphi_{\mathbf{C}}(s) = \log \phi_{\mathbf{C}}(s) &amp; (30)
  \end{array}
\end{align}`

e
a matriz de log-cumulante (MLC)
de `\(\nu\)` -ésima ordem
é definida como

`\begin{align}
  \begin{array}{lr}
\left. \kappa_\nu{\mathbf{C}} = \dfrac{d^\nu}{ds^\nu}\varphi_{\mathbf{C}}(s) \right|_{s=m}. &amp; (31)
  \end{array}
\end{align}`

## Conclusões
&lt;hr/&gt;

#### Entropia de Shannon para a distribuição `\(\mathcal{G}^0_I\)`: Novas abordagens para segmentação e detecção de mudança em imagens SAR


* Para segmentação, foram realizadas três aplicações em imagens reais
e duas aplicações para detecção de mudança.

* Para segmentação das imagens EMISAR de Foulum (homogênea com cinco áreas) e para a imagem AIRSAR de Flevoland (homogênea com onze áreas), o segmentador baseado na entropia de Shannon da `\(\Gamma\)` sob dependência `\(\text{DEL}_{\Gamma^*}\)` forneceu os melhores resultados.

* Para a imagem E-SAR de Munique (mais heterogênea), o procedimento de segmentação baseado em entropia de Shannon da `\(\mathcal{G}^0_I\)` sob independência `\(\text{IEL}_{\mathcal{G}^0}\)` ofereceu o melhor resultado.


---

## Conclusões
&lt;hr/&gt;

#### Entropia de Shannon para a distribuição `\(\mathcal{G}^0_m\)`: ensaios sobe segmentação não supervisionada e detecção de mudança

* Resultados
indicam que 
o segmentador baseado na entropia de Shannon
da lei `\(\mathcal{G}^0_m\)`
foi mais recomendado para reconhecer regiões
sobre imagens com áreas mais misturas,
enquanto
aquele construído a partir da  
 `\(\text{s}\mathcal{W}_{m}^{\mathbb{C}}\)`
foi a melhor opção para imagens com regiões mais dispersas.

&lt;hr/&gt;

#### Detecção de mudança

&lt;!--* Neste caso, para as duas regiões o melhor detector de mudança segundo o coeficiente Kappa foi o D-$H_\text{S}(\,s\mathcal{W}^{\mathbb{C}}_m)|\widehat{L}$, que é o detector baseado no `\(H_\text{S}(\,s\mathcal{W}^{\mathbb{C}}_m\,)\)` para \acrshort{enl} estimado. --&gt;

* Comparando os resultados dos detectores propostos para dados *SAR* com o propostos para dados *PolSAR*, as melhores detecções de mudança foram obtidas utilizando as imagens *PolSAR*.

---

## Conclusões
&lt;hr/&gt;

#### SOMAS COMPOSTAS PARA MATRIZES ESTOCÁSTICAS APLICADAS A SISTEMAS POLSAR

* Foram derivados estimadores de máxima verossimilhança (EMVs) para ajustar os modelos *PolSAR* através do Algoritmo *Expectation-Maximization*.

* Os resultados numéricos para  as expressões dos EMVs encontrados indicaram que tais estimativas apresentaram valores baixos de viés e erros quadráticos médios para tamanhos de amostra que são realistas com a prática de processamento de dados *PolSAR*.

* Os diagramas de MLCs como critério de comparação apontaram que os modelos  `\(\text{CPT}\mathcal{W}_m^{\mathbb{C}}\)` e `\(\text{CG}\mathcal{W}_m^{\mathbb{C}}\)` podem fornecer melhores descrições de alguns cenários *PolSAR*.
